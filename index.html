<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINSTORM 300</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e0e5ec;
            color: #333;
            padding: 20px;
        }
        #game-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 700px;
            max-height: 95vh;
            overflow-y: auto;
        }
        h1 { margin-top: 0; color: #2c3e50; letter-spacing: 4px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .setup-section { margin: 20px 0; }
        .player-input-row { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; }
        input[type="text"] { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 200px; }
        
        #tricky-banner { background-color: #f39c12; color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; display: inline-flex; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #category { font-weight: bold; color: #8e44ad; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; font-size: 1.2rem; }
        #question { font-size: 1.8rem; margin: 10px 0; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        #timer { font-size: 4rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        
        #answers { text-align: left; background: #fdfbfb; padding: 15px; border-radius: 12px; margin: 15px 0; border: 2px solid #eee; }
        ol { padding-left: 25px; }
        
        #scoreboard { width: 100%; border-collapse: collapse; margin-top: 20px; background: #f9f9f9; border-radius: 10px; overflow: hidden; }
        #scoreboard th, #scoreboard td { padding: 10px; border: 1px solid #ddd; }
        #scoreboard th { background: #34495e; color: white; }

        .btn-container { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        button { border: none; padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        #next-btn { background-color: #2ecc71; }
        #show-btn { background-color: #3498db; }
        #start-game-btn { background-color: #8e44ad; width: 100%; max-width: 250px; }
        .score-btn { background-color: #95a5a6; font-size: 0.9rem; }
        
        #reset-cards-btn { background: none; color: #bdc3c7; font-size: 0.8rem; margin-top: 30px; text-decoration: underline; cursor: pointer; border: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>BRAINSTORM</h1>

    <div id="setup-area">
        <div class="setup-section">
            <h3>Antal spelare:</h3>
            <select id="player-count" onchange="createPlayerInputs()">
                <option value="2">2 Spelare</option>
                <option value="3">3 Spelare</option>
                <option value="4">4 Spelare</option>
                <option value="5">5 Spelare</option>
                <option value="6">6 Spelare</option>
            </select>
        </div>
        <div id="player-names-container" class="setup-section"></div>
        <button id="start-game-btn" onclick="startGame()">Starta runda</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="tricky-banner" class="hidden">⚠️ KLURIGT KORT!</div>
        <div id="category">Kategori</div>
        <div id="question">Tryck på "Dra nytt kort" för att börja</div>
        <div id="timer">45</div>
        
        <div id="answers" class="hidden">
            <strong>Facit:</strong>
            <ol id="answer-list"></ol>
        </div>

        <div id="point-awarding" class="hidden">
            <p>Vem vann rundan?</p>
            <div id="score-buttons" class="btn-container"></div>
        </div>

        <div class="btn-container">
            <button id="show-btn" class="hidden" onclick="showAnswersManually()">Visa svar / Ge poäng</button>
            <button id="next-btn" onclick="nextCard()">Dra nytt kort</button>
        </div>

        <table id="scoreboard">
            <thead>
                <tr><th>Spelare</th><th>Poäng</th></tr>
            </thead>
            <tbody id="scoreboard-body"></tbody>
        </table>

        <div id="counter" style="margin-top: 15px; font-size: 0.8rem; color: #999;">Kort kvar: -</div>
        <button id="reset-cards-btn" onclick="resetPlayedCards()">Återställ korthögen (nollställ historik)</button>
    </div>
</div>

    // --- LOGIK ---
    let players = [];
    let playedCardIndices = [];
    let currentCards = [...standardCards, ...trickyCards];
    let timer;
    let audioCtx = null;

    window.onload = function() {
        createPlayerInputs();
        loadPlayedCards(); // Bara korten sparas
        updateCounter();
    };

    function createPlayerInputs() {
        const count = document.getElementById('player-count').value;
        const container = document.getElementById('player-names-container');
        container.innerHTML = "<h4>Skriv namn:</h4>";
        for (let i = 1; i <= count; i++) {
            container.innerHTML += `
                <div class="player-input-row">
                    <input type="text" id="p${i}" placeholder="Spelare ${i}">
                </div>
            `;
        }
    }

    function startGame() {
        const count = document.getElementById('player-count').value;
        players = [];
        for (let i = 1; i <= count; i++) {
            const name = document.getElementById(`p${i}`).value || `Spelare ${i}`;
            players.push({ name: name, score: 0 });
        }
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        updateScoreboard();
    }

    function nextCard() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        
        const available = [];
        for(let i=0; i < currentCards.length; i++) {
            if(!playedCardIndices.includes(i)) available.push(i);
        }

        if (available.length === 0) {
            alert("Slut på kort! Återställer högen...");
            resetPlayedCards();
            return;
        }

        const idx = available[Math.floor(Math.random() * available.length)];
        const card = currentCards[idx];
        playedCardIndices.push(idx);
        savePlayedCards();

        clearInterval(timer);
        document.getElementById('tricky-banner').className = card.tricky ? "" : "hidden";
        document.getElementById('category').innerText = card.cat;
        document.getElementById('question').innerText = card.q;
        document.getElementById('answers').classList.add('hidden');
        document.getElementById('point-awarding').classList.add('hidden');
        document.getElementById('show-btn').classList.remove('hidden');
        
        const list = document.getElementById('answer-list');
        list.innerHTML = "";
        card.a.forEach(item => {
            let li = document.createElement('li');
            li.innerText = item;
            list.appendChild(li);
        });

        updateCounter();
        startTimer();
    }

    function startTimer() {
        let timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('timer').style.color = "#e74c3c";
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                playSignal();
                showAnswersManually();
            }
        }, 1000);
    }

    function showAnswersManually() {
        clearInterval(timer);
        document.getElementById('timer').innerText = "TIDEN UTE";
        document.getElementById('answers').classList.remove('hidden');
        document.getElementById('show-btn').classList.add('hidden');
        showPointButtons();
    }

    function showPointButtons() {
        const container = document.getElementById('score-buttons');
        container.innerHTML = "";
        players.forEach((p, index) => {
            container.innerHTML += `<button class="score-btn" onclick="addPoint(${index})">+1 ${p.name}</button>`;
        });
        container.innerHTML += `<button class="score-btn" style="background:#bdc3c7" onclick="hidePoints()">Ingen</button>`;
        document.getElementById('point-awarding').classList.remove('hidden');
    }

    function addPoint(playerIndex) {
        players[playerIndex].score++;
        updateScoreboard();
        hidePoints();
    }

    function hidePoints() {
        document.getElementById('point-awarding').classList.add('hidden');
    }

    function updateScoreboard() {
        const body = document.getElementById('scoreboard-body');
        body.innerHTML = "";
        const sorted = [...players].sort((a, b) => b.score - a.score);
        sorted.forEach(p => {
            body.innerHTML += `<tr><td>${p.name}</td><td>${p.score}</td></tr>`;
        });
    }

    function updateCounter() {
        const remaining = currentCards.length - playedCardIndices.length;
        document.getElementById('counter').innerText = `Kort kvar i högen: ${remaining} (av ${currentCards.length})`;
    }

    function savePlayedCards() {
        localStorage.setItem('brainstorm_played_indices', JSON.stringify(playedCardIndices));
    }

    function loadPlayedCards() {
        const saved = localStorage.getItem('brainstorm_played_indices');
        if (saved) playedCardIndices = JSON.parse(saved);
    }

    function resetPlayedCards() {
        if(confirm("Vill du verkligen nollställa korthögen? (Alla 300 kort blir tillgängliga igen)")) {
            playedCardIndices = [];
            savePlayedCards();
            updateCounter();
            location.reload();
        }
    }

    function playSignal() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playTone = (freq, start, duration) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.1, start);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(start); osc.stop(start + duration);
        };
        const now = audioCtx.currentTime;
        playTone(523.25, now, 0.4); playTone(659.25, now + 0.2, 0.4); playTone(783.99, now + 0.4, 0.6);
    }
</script>
